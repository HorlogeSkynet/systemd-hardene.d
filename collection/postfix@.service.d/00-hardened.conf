[Service]
CapabilityBoundingSet=CAP_DAC_READ_SEARCH CAP_DAC_OVERRIDE CAP_KILL CAP_NET_BIND_SERVICE CAP_SETUID CAP_SETGID

MemoryDenyWriteExecute=yes

PrivateBPF=yes
PrivateDevices=yes
PrivateMounts=yes
PrivateTmp=yes

ProtectClock=yes
ProtectControlGroups=yes
ProtectHostname=yes
ProtectKernelLogs=yes
ProtectKernelModules=yes
ProtectKernelTunables=yes
ProtectSystem=strict
ReadWritePaths=-/var/lib/postfix -/var/spool/postfix -/run/opendkim -/run/opendmarc -/run/postgrey

RemoveIPC=yes

RestrictAddressFamilies=AF_INET AF_INET6 AF_NETLINK AF_UNIX
RestrictNamespaces=yes
RestrictRealtime=yes
RestrictSUIDSGID=yes

LockPersonality=yes
SystemCallArchitectures=native
SystemCallFilter=@privileged @system-service
SystemCallFilter=~@resources chroot
