[Service]
CapabilityBoundingSet=CAP_AUDIT_WRITE CAP_BPF CAP_DAC_OVERRIDE CAP_KILL CAP_NET_ADMIN CAP_NET_BIND_SERVICE CAP_NET_RAW CAP_SETGID CAP_SETUID CAP_SYS_CHROOT CAP_SYS_MODULE

MemoryDenyWriteExecute=yes

NoNewPrivileges=yes

PrivateBPF=yes
DevicePolicy=closed
DeviceAllow=/dev/net/tun
PrivateIPC=yes
PrivateTmp=yes

ProtectClock=yes
ProtectControlGroups=yes
ProtectHome=read-only
ProtectHostname=yes
ProtectKernelLogs=true
ProtectProc=invisible
ProcSubset=pid
ProtectSystem=strict
ReadWritePaths=-/etc -/proc/sys/net -/var/lib/NetworkManager/

RestrictAddressFamilies=AF_BLUETOOTH AF_INET AF_INET6 AF_NETLINK AF_PACKET
RestrictNamespaces=yes
RestrictRealtime=yes
RestrictSUIDSGID=yes

LockPersonality=yes
SystemCallArchitectures=native
SystemCallFilter=@system-service @privileged
